<!DOCTYPE html>
<html>
<head>
    <title>Add Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card">

        <div class="card-header">
            <h4>Add Result</h4>
        </div>

        <div class="card-body">

            <p><b>Student:</b> {{ student.full_name }}</p>
            <p><b>Subject:</b> {{ subject.subject_name }}</p>

            <form method="POST">

                <div class="mb-3">
                    <label>Score</label>
                    <input type="number" name="score" class="form-control" required>
                </div>

                <button class="btn btn-primary">
                    Save Result
                </button>

            </form>

        </div>

    </div>

</div>


  <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Flash message handling with SweetAlert2 -->
<script>
   // Flash message handling with SweetAlert2
   const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};
   
   if (flashMessages.length > 0) {
       const [category, message] = flashMessages[0];
   
       const Toast = Swal.mixin({
           toast: true,
           position: 'top-end',
           showConfirmButton: false,
           timer: 3000,
           timerProgressBar: true,
           background: '#fff',
           color: '#333',
           didOpen: (toast) => {
               toast.addEventListener('mouseenter', Swal.stopTimer)
               toast.addEventListener('mouseleave', Swal.resumeTimer)
           }
       });
   
       Toast.fire({
           icon: category === "success" ? "success" : "info",
           title: message
       });
   }
</script>



</body>
</html>
