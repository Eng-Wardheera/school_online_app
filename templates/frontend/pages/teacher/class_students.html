<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Class Students</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<!-- HEADER -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">

        <div>
            <h2 class="fw-bold mb-1">{{ class_name }}</h2>
            <p class="text-muted mb-0">
                Subject: <strong>{{ subject_name }}</strong>
            </p>
        </div>

        <a href="{{ url_for('main.teacher_dashboard', teacher_id=teacher._id) }}"
           class="btn btn-outline-primary">
            <i class="bi bi-arrow-left"></i> Back
        </a>

    </div>
</div>


<!-- STATS -->
<div class="row mb-4 g-3">

    <div class="col-md-4">
        <div class="card border-0 shadow-sm bg-primary text-white">
            <div class="card-body">
                <h6>Total Students</h6>
                <h2>{{ students|length }}</h2>
            </div>
        </div>
    </div>


    <div class="col-md-4">
        <div class="card border-0 shadow-sm bg-success text-white">
            <div class="card-body">
                <h6>Class</h6>
                <h3>{{ class_name }}</h3>
            </div>
        </div>
    </div>


    <div class="col-md-4">
        <div class="card border-0 shadow-sm bg-warning text-dark">
            <div class="card-body">
                <h6>Subject</h6>
                <h3>{{ subject_name }}</h3>
            </div>
        </div>
    </div>

</div>



<!-- SEARCH + FILTER -->
<div class="card border-0 shadow-sm mb-3">
    <div class="card-body">

        <div class="row g-2 align-items-center">

            <div class="col-md-8">

                <div class="input-group">

                    <span class="input-group-text bg-white">
                        <i class="bi bi-search"></i>
                    </span>


                    <input type="text"
                           id="searchInput"
                           class="form-control"
                           placeholder="Search student name or role no...">

                </div>

            </div>


            <div class="col-md-4">

                <select id="statusFilter" class="form-select">

                    <option value="all">All Students</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>

                </select>

            </div>

        </div>

    </div>
</div>




<!-- FORM -->
<form method="POST" action="{{ url_for('main.save_bulk_results') }}">

<input type="hidden" name="assignment_id" value="{{ assignment._id }}">


<div class="card border-0 shadow-sm">


<div class="card-body p-0">

<div class="table-responsive">


<table class="table table-hover mb-0" id="studentTable">


<thead class="table-dark">

<tr>

<th>#</th>

<th>Student Name</th>

<th>Score</th>

</tr>

</thead>



<tbody>


{% for student in students|sort(attribute='full_name') %}


<tr class="student-row"

data-name="{{ student.full_name|lower }}"

data-role="{{ student.role_no|lower }}"

data-status="{{ 'active' if student.status else 'inactive' }}">



<td>{{ loop.index }}</td>



<td class="fw-bold">

{{ student.full_name }}

</td>



<td>

<input type="number"

name="scores[{{ student._id }}]"

class="form-control"

min="0"

max="100"

placeholder="0 - 100"

value="{{ result_map.get(student._id|string, '') }}">


</td>



</tr>


{% endfor %}


</tbody>

<div class="d-flex justify-content-between align-items-center p-3">

    <div>
        <label class="fw-bold">Show:</label>
        <select id="pageSize" class="form-select d-inline-block w-auto">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>
        Students
    </div>


   

</div>

</table>


</div>

</div>



<div class="card-header bg-white">


    <!-- Pagination TOP RIGHT -->
    <div class="d-flex justify-content-center justify-content-md-end align-items-center gap-2 mb-3">


        <button type="button" id="prevBtn" class="btn btn-outline-primary">

            <i class="bi bi-arrow-left"></i>
            <span class="d-none d-sm-inline">Previous</span>

        </button>



        <span id="pageInfo" class="fw-bold text-nowrap"></span>



        <button type="button" id="nextBtn" class="btn btn-outline-primary">

            <span class="d-none d-sm-inline">Next</span>
            <i class="bi bi-arrow-right"></i>

        </button>


    </div>



    <!-- Save Button BELOW CENTER -->
    <div class="text-center mt-3">


        <button type="submit" class="btn btn-primary">

            <i class="bi bi-save"></i>
            Save All Results

        </button>


    </div>


</div>

</div>


</form>


</div>






<script>

const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

const pageSizeSelect = document.getElementById("pageSize");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const pageInfo = document.getElementById("pageInfo");


let currentPage = 1;
let pageSize = 10;



function getFilteredRows(){

    let search = searchInput.value.toLowerCase();
    let status = statusFilter.value;


    return Array.from(
        document.querySelectorAll(".student-row")
    ).filter(row=>{


        let name = row.dataset.name;
        let role = row.dataset.role;
        let st = row.dataset.status;


        let matchSearch =
        name.includes(search) ||
        role.includes(search);


        let matchStatus =
        status === "all" ||
        status === st;


        return matchSearch && matchStatus;


    });


}



function renderTable(){


    let rows = getFilteredRows();


    let totalPages = Math.ceil(rows.length / pageSize);


    if(currentPage > totalPages){
        currentPage = totalPages || 1;
    }



    document.querySelectorAll(".student-row")
    .forEach(row=>{
        row.style.display="none";
    });



    let start =
    (currentPage-1) * pageSize;


    let end =
    start + pageSize;



    rows.slice(start,end)
    .forEach(row=>{

        row.style.display="";

    });



    pageInfo.innerHTML =
    `Page ${currentPage} of ${totalPages || 1}`;



    prevBtn.disabled =
    currentPage <= 1;


    nextBtn.disabled =
    currentPage >= totalPages;



}



searchInput.addEventListener("input",()=>{

    currentPage=1;
    renderTable();

});



statusFilter.addEventListener("change",()=>{

    currentPage=1;
    renderTable();

});



pageSizeSelect.addEventListener("change",()=>{

    pageSize =
    Number(pageSizeSelect.value);

    currentPage=1;

    renderTable();

});



prevBtn.addEventListener("click",()=>{


    if(currentPage>1){

        currentPage--;

        renderTable();

    }


});



nextBtn.addEventListener("click",()=>{


    let rows=getFilteredRows();

    let totalPages =
    Math.ceil(rows.length/pageSize);



    if(currentPage < totalPages){

        currentPage++;

        renderTable();

    }


});



renderTable();


</script>



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



<script>


const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};



if(flashMessages.length > 0){


const [category,message] = flashMessages[0];



const Toast = Swal.mixin({

toast:true,

position:'top-end',

showConfirmButton:false,

timer:3000,

timerProgressBar:true

});



Toast.fire({

icon: category === "success" ? "success":"info",

title:message

});


}


</script>




<script>


const endTime = new Date("{{ end_time }}");



function checkExpiry(){


const now = new Date();



if(now >= endTime){


clearInterval(expiryInterval);



Swal.fire({

icon:"error",

title:"Deadline Expired",

text:"Waqtiga gelinta natiijada wuu dhammaaday.",

timer:3000,

timerProgressBar:true,

showConfirmButton:false,

allowOutsideClick:false,

allowEscapeKey:false


}).then(()=>{


window.location.replace("/");


});


}


}



const expiryInterval = setInterval(checkExpiry,1000);



</script>




</body>
</html>
