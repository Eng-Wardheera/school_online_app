<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaamil Computer & Technology</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f4f7f9; padding: 20px; }
        .header { background: linear-gradient(135deg, #0d4c7d, #1b6ba8); color: white; padding: 25px; text-align: center; border-radius: 15px; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        
        .card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 15px; }
        .title { font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .price { font-size: 18px; color: #333; margin-bottom: 10px; font-weight: 800; }
        .status { color: #27ae60; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        
        .order-btn { 
            background: #27ae60; color: white; border: none; padding: 12px 20px; 
            border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%;
        }
        .order-btn:hover { background: #219150; }
        .delivery { color: #e74c3c; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KAAMIL COMPUTER & TECHNOLOGY</h1>
    </div>

    <div class="container" id="product-list">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=500" alt="Lenovo">
            <div class="title">LENOVO CHARGER YOGA</div>
            <div class="price">$18.00</div>
            <div class="status">In stock</div>
            <button class="order-btn" onclick="order('LENOVO CHARGER YOGA', '$18.00')">Order Now</button>
            <div class="delivery">🚚 Free Delivery Available</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1601784551446-20c9e07cdbdb?w=500" alt="Microsoft">
            <div class="title">MICROSOFT CHARGER</div>
            <div class="price">$20.00</div>
            <div class="status">In stock</div>
            <button class="order-btn" onclick="order('MICROSOFT CHARGER', '$20.00')">Order Now</button>
            <div class="delivery">🚚 Free Delivery Available</div>
        </div>
    </div>

    <script>
        function order(name, price) {
            // Halkan geli lambarkaaga WhatsApp (iyadoo aan lagu darin +)
            const phone = "252618552904"; 
            const msg = `Salaan, waxaan rabaa inaan dalbado alaabtan:%0A%0A` +
                        `*Alaabta:* ${name}%0A` +
                        `*Qiimaha:* ${price}%0A%0A` +
                        `Fadlan iiga soo jawaaba.`;
            
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
