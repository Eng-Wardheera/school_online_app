<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Portal Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

/* FULL BACKGROUND */
body {
    background: url("https://images.unsplash.com/photo-1509062522246-3755977927d7")
    no-repeat center center fixed;

    background-size: cover;
    overflow-x:hidden;
}


/* DARK OVERLAY */
.overlay {

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.6);

    z-index:0;
}



/* LOGIN CARD */
.login-card {

    backdrop-filter:blur(12px);

    background:rgba(255,255,255,0.88);

    border-radius:15px;

    padding:30px;

    transition:.3s;

}



/* LOGO */
.logo {

    width:90px;

    height:90px;

    object-fit:contain;

    margin-bottom:10px;

}



/* FLASH */
.alert-animated {

    position:relative;

    overflow:hidden;

    transition:
    opacity .6s ease,
    transform .6s ease;

}


.alert-fade-out {

    opacity:0;

    transform:translateY(-10px);

}




.flash-progress {

    position:absolute;

    bottom:0;

    left:0;

    height:4px;

    width:100%;

    background:rgba(0,0,0,.15);

}


.flash-progress-bar {

    height:100%;

    width:100%;

    background:currentColor;

    animation:shrinkWidth 5s linear forwards;

}



@keyframes shrinkWidth {

from{

width:100%;

}

to{

width:0;

}

}




/* PRELOADER */

#preloader {

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;


    background:rgba(0,0,0,.75);

    backdrop-filter:blur(5px);


    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;


    z-index:9999;


    opacity:0;

    pointer-events:none;


    transition:.4s;

}



#preloader.active {

    opacity:1;

    pointer-events:auto;

}




.custom-spinner {

    width:60px;

    height:60px;


    border:5px solid rgba(255,255,255,.1);

    border-radius:50%;


    border-top-color:#198754;


    animation:spin 1s linear infinite;

}



@keyframes spin {

to{

transform:rotate(360deg);

}

}


</style>


</head>


<body>


<div class="overlay"></div>



<!-- LOADING -->

<div id="preloader">

    <div class="custom-spinner mb-3"></div>

    <h5 class="text-white fw-semibold">
        Galeysa, fadlan sug...
    </h5>

</div>




<div class="container position-relative" style="z-index:1;">


<div class="row justify-content-center align-items-center"
     style="height:100vh;">



<div class="col-md-5 col-sm-10">


<div class="login-card shadow text-center">



<img src="{{ url_for('static',
filename='frontend/images/school-logo.jpeg') }}"
class="logo"
alt="School Logo">



<h3 class="mb-1 fw-bold">

    Student Portal

</h3>


<p class="text-muted mb-4">

    Login with your Student ID

</p>




{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}


<div id="flash-container">


{% for category,message in messages %}


<div class="alert alert-{{category}}
alert-animated shadow-sm
alert-dismissible fade show mb-3">


{{message}}


<button type="button"
class="btn-close"
data-bs-dismiss="alert">

</button>


<div class="flash-progress">

<div class="flash-progress-bar"></div>

</div>


</div>


{% endfor %}


</div>


{% endif %}

{% endwith %}






<form method="POST" id="loginForm">



<div class="mb-3 text-start">


<label class="form-label fw-semibold">

Student ID

</label>



<input type="text"

name="role_no"

class="form-control"

placeholder="STD-0089"

required>


</div>




<button type="submit"

class="btn btn-success w-100 fw-bold shadow-sm">


Login


</button>



</form>



</div>


</div>


</div>


</div>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



<script>


document.addEventListener("DOMContentLoaded",function(){



const flashContainer =
document.getElementById('flash-container');


if(flashContainer){


setTimeout(function(){


flashContainer
.querySelectorAll('.alert')
.forEach(function(alert){


alert.classList.add(
'alert-fade-out'
);



setTimeout(function(){


let bsAlert =
bootstrap.Alert.getInstance(alert);



if(bsAlert){

bsAlert.close();

}

else{

alert.remove();

}


},600);



});



},5000);



}




const loginForm =
document.getElementById('loginForm');


const preloader =
document.getElementById('preloader');



if(loginForm){


loginForm.addEventListener(
'submit',
function(){


preloader.classList.add(
'active'
);


});


}



});


</script>



</body>

</html>
