<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Dashboard</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">


<style>


body{

background:#f5f7fb;

font-family:Arial, Helvetica, sans-serif;

}



/* HEADER */

.top-header{

background:linear-gradient(
135deg,
#198754,
#20c997
);

color:white;

padding:25px;

border-radius:0 0 25px 25px;

}



/* PROFILE */

.profile-card{

margin-top:-50px;

border:none;

border-radius:20px;

}



.student-avatar{

width:100px;

height:100px;

border-radius:50%;

background:white;

display:flex;

align-items:center;

justify-content:center;

font-size:45px;

color:#198754;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}



/* BOX */

.info-box{

background:white;

border-radius:15px;

padding:20px;

border:none;

box-shadow:
0 5px 20px rgba(0,0,0,.05);

height:100%;

}



.info-icon{

font-size:30px;

color:#198754;

}



/* RESULT */

.result-card{

background:white;

border-radius:15px;

padding:20px;

box-shadow:
0 5px 20px rgba(0,0,0,.05);

}



.badge-score{

font-size:15px;

padding:8px 15px;

}



</style>


</head>


<body>



<!-- HEADER -->


<div class="top-header">


<div class="container">


<div class="d-flex justify-content-between align-items-center">


<div>


<h3 class="fw-bold">

Student Portal

</h3>


<p class="mb-0">

Welcome back, {{ student.full_name }}

</p>


</div>



<a href="{{ url_for('main.student_login') }}"

class="btn btn-light">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>



</div>


</div>


</div>







<div class="container">



<!-- PROFILE -->


<div class="card profile-card shadow">


<div class="card-body text-center">



<div class="student-avatar mx-auto mb-3">


<i class="bi bi-person-fill"></i>


</div>



<h4 class="fw-bold">

{{ student.full_name }}

</h4>



<span class="badge bg-success">

{{ student.role_no }}

</span>



</div>


</div>









<!-- INFORMATION -->


<div class="row g-4 mt-4">



<div class="col-md-4">


<div class="info-box text-center">


<div class="info-icon">

<i class="bi bi-building"></i>

</div>



<h6 class="text-muted mt-3">

Class

</h6>


<h5 class="fw-bold">

{{ class_name }}

</h5>



</div>


</div>







<div class="col-md-4">


<div class="info-box text-center">


<div class="info-icon">

<i class="bi bi-people"></i>

</div>



<h6 class="text-muted mt-3">

Section

</h6>


<h5 class="fw-bold">

{{ section_name }}

</h5>



</div>


</div>







<div class="col-md-4">


<div class="info-box text-center">


<div class="info-icon">

<i class="bi bi-clock"></i>

</div>



<h6 class="text-muted mt-3">

Shift

</h6>


<h5 class="fw-bold">

{{ student.shift_name }}

</h5>



</div>


</div>



</div>








<!-- QUICK MENU -->


<div class="row g-4 mt-3">



<div class="col-md-6">


<a href="{{ url_for('main.student_results',
student_id=student._id) }}"
class="text-decoration-none">


<div class="info-box">


<h5 class="fw-bold text-success">

<i class="bi bi-award"></i>

My Results

</h5>


<p class="text-muted mb-0">

View all exam marks

</p>


</div>


</a>


</div>







<div class="col-md-6">


<div class="info-box">


<h5 class="fw-bold text-primary">

<i class="bi bi-calendar-check"></i>

Attendance

</h5>


<p class="text-muted mb-0">

Check attendance records

</p>


</div>


</div>



</div>









<!-- FOOTER -->


<div class="text-center mt-5 mb-4 text-muted">


<i class="bi bi-mortarboard"></i>

School Management System


</div>



</div>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
