<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Teacher Portal Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* FULL BACKGROUND */
body {
    background: url("https://images.unsplash.com/photo-1588072432836-e10032774350") no-repeat center center fixed;
    background-size: cover;
    overflow-x: hidden;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index: 0;
}

/* LOGIN CARD */
.login-card {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.85);
    border-radius: 15px;
    padding: 30px;
    transition: all 0.3s ease-in-out;
}

/* LOGO */
.logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    margin-bottom: 10px;
}

/* FLASH MESSAGE ANIMATION */
.alert-animated {
    position: relative;
    overflow: hidden; /* Si progress bar-ka uusan deyrka uga bixin */
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 1;
    transform: translateY(0);
}
.alert-fade-out {
    opacity: 0;
    transform: translateY(-10px);
}

/* FLASH PROGRESS BAR */
.flash-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    width: 100%;
    background-color: rgba(0, 0, 0, 0.15);
}

.flash-progress-bar {
    height: 100%;
    width: 100%;
    background-color: currentColor; /* Wuxuu qaadanayaa midabka qoraalka alert-ka (tsh. cagaar ama gaduud) */
    animation: shrinkWidth 5s linear forwards;
}

@keyframes shrinkWidth {
    from { width: 100%; }
    to { width: 0%; }
}

/* ADVANCED PRELOADER OVERLAY */
#preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

#preloader.active {
    opacity: 1;
    pointer-events: auto;
}

/* Custom CSS Spinner */
.custom-spinner {
    width: 60px;
    height: 60px;
    border: 5px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    border-top-color: #0d6efd;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

</style>

</head>

<body>

<div class="overlay"></div>

<div id="preloader">
    <div class="custom-spinner mb-3"></div>
    <h5 class="text-white fw-semibold">Galeysa, fadlan sug...</h5>
</div>

<div class="container position-relative" style="z-index:1;">

    <div class="row justify-content-center align-items-center" style="height:100vh;">

        <div class="col-md-5 col-sm-10">

            <div class="login-card shadow text-center">

                <img src="{{ url_for('static', filename='frontend/images/school-logo.jpeg') }}"
                     class="logo"
                     alt="School Logo">

                <h3 class="mb-1 fw-bold">Teacher Portal</h3>
                <p class="text-muted mb-4">Login with your Teacher ID</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div id="flash-container">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-animated shadow-sm alert-dismissible fade show mb-3" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            <div class="flash-progress">
                                <div class="flash-progress-bar"></div>
                            </div>
                        </div>
                    {% endfor %}
                    </div>
                {% endif %}
                {% endwith %}

                <form method="POST" id="loginForm">

                    <div class="mb-3 text-start">
                        <label class="form-label fw-semibold">Teacher ID</label>
                        <input type="text"
                               name="teacher_role_id"
                               class="form-control"
                               placeholder="TCH-2589898"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    
    // 1. FLASH MESSAGE AUTO-HIDE WITH PROGRESS TIME
    const flashContainer = document.getElementById('flash-container');
    if (flashContainer) {
        setTimeout(function() {
            const alerts = flashContainer.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                // Ku dar class-ka animation-ka luminta ah (Fade out)
                alert.classList.add('alert-fade-out');
                
                // Kadibna gebi ahaanba shaxda ka saar marka uu animation-ku dhammaado (600ms)
                setTimeout(function() {
                    let bsAlert = bootstrap.Alert.getInstance(alert);
                    if (bsAlert) {
                        bsAlert.close();
                    } else {
                        alert.remove();
                    }
                }, 600);
            });
        }, 5000); // Progress bar-ku wuxuu ku dhammaanayaa 5000ms (5 Seconds)
    }

    // 2. PRELOADER EFFECT (Marka la gujiyo Login-ka)
    const loginForm = document.getElementById('loginForm');
    const preloader = document.getElementById('preloader');

    if (loginForm) {
        loginForm.addEventListener('submit', function() {
            // Soo bandhig preloader-ka weyn
            preloader.classList.add('active');
        });
    }
});
</script>

</body>
</html>
