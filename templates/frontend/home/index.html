<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Teacher Portal Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* FULL BACKGROUND */
body {
    background: url("https://images.unsplash.com/photo-1588072432836-e10032774350") no-repeat center center fixed;
    background-size: cover;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index: 0;
}

/* LOGIN CARD */
.login-card {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.85);
    border-radius: 15px;
    padding: 30px;
}

/* LOGO */
.logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    margin-bottom: 10px;
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container position-relative" style="z-index:1;">

    <div class="row justify-content-center align-items-center" style="height:100vh;">

        <div class="col-md-5 col-sm-10">

            <div class="login-card shadow text-center">

                <!-- SCHOOL LOGO -->
                <img src="{{ url_for('static', filename='images/school-logo.png') }}"
                     class="logo"
                     alt="School Logo">

                <h3 class="mb-1 fw-bold">Teacher Portal</h3>
                <p class="text-muted mb-4">Login with your Teacher ID</p>

                <!-- FLASH MESSAGES -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                {% endwith %}

                <!-- FORM -->
                <form method="POST">

                    <div class="mb-3 text-start">
                        <label class="form-label">Teacher ID</label>
                        <input type="text"
                               name="teacher_role_id"
                               class="form-control"
                               placeholder="TCH-2589898"
                               required>
                    </div>

                    <button class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
