{% extends 'backend/home/base.html' %}

{% block title %}Edit Student{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <div class="card-header">
                <h5>Edit Student</h5>
            </div>

            <div class="card-body">

                <!-- FULL NAME -->
                <div class="mb-3">
                    <label class="fw-bold">Full Name</label>
                    <input type="text"
                           name="full_name"
                           class="form-control"
                           value="{{ student.full_name }}"
                           required>
                </div>

                <!-- CLASS -->
                <div class="mb-3">
                    <label class="fw-bold">Class</label>
                    <select name="class_id" id="classSelect" class="form-select" required>

                        {% for c in classes %}
                            <option value="{{ c._id }}"
                                    data-shift="{{ c.shift_name }}"
                                    {% if c._id|string == student.class_id|string %}selected{% endif %}>
                                {{ c.class_name }}
                            </option>
                        {% endfor %}

                    </select>
                </div>

                <!-- SHIFT (AUTO) -->
                <div class="mb-3">
                    <label class="fw-bold">Shift (Auto)</label>
                    <input type="text"
                           id="shiftInput"
                           class="form-control"
                           value="{{ student.shift_name }}"
                           readonly>
                </div>

                <!-- SECTION -->
                <div class="mb-3">
                    <label class="fw-bold">Section (Optional)</label>

                    <select name="section_id" class="form-select">

                        <option value=""
                            {% if not student.section_id or student.section_id == 'None' %}
                                selected
                            {% endif %}>
                            No Section
                        </option>

                        {% for s in sections %}
                        <option value="{{ s._id }}"
                            {% if student.section_id and s._id|string == student.section_id|string %}
                                selected
                            {% endif %}>
                            {{ s.section_name }}
                        </option>
                        {% endfor %}

                    </select>
                </div>

                <!-- STATUS -->
                <div class="mb-3 form-check">

                    <input type="checkbox"
                           name="status"
                           class="form-check-input"
                           {% if student.status %}checked{% endif %}>

                    <label class="form-check-label fw-bold">
                        Active Student
                    </label>

                </div>

            </div>

            <div class="card-footer text-center">
                <button class="btn btn-primary">
                    Update Student
                </button>
            </div>

        </div>

    </form>

</div>

<!-- AUTO SHIFT SCRIPT -->
<script>
document.getElementById("classSelect").addEventListener("change", function () {

    let selected = this.options[this.selectedIndex];
    let shift = selected.getAttribute("data-shift");

    document.getElementById("shiftInput").value = shift || "";

});
</script>

{% endblock %}
