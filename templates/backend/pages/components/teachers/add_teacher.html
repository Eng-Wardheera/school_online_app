{% extends 'backend/home/base.html' %}

{% block title %}Add Teacher | School Management System{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <!-- HEADER -->
            <div class="card-header">
                <h5 class="mb-0">Add New Teacher</h5>
            </div>

            <!-- BODY -->
            <div class="card-body">

                <!-- FULL NAME -->
                <div class="row mb-3">

                    <div class="col-md-3">
                        <label class="fw-bold">Full Name</label>
                    </div>

                    <div class="col-md-9">
                        <input type="text"
                               name="full_name"
                               class="form-control"
                               placeholder="Enter teacher name"
                               required>
                    </div>

                </div>

                <!-- AUTO ID DISPLAY (optional UI only) -->
                <div class="row mb-3">

                    <div class="col-md-3">
                        <label class="fw-bold">Teacher ID</label>
                    </div>

                    <div class="col-md-9">
                        <input type="text"
                               class="form-control"
                               value="Will be auto-generated (e.g. TCH-2589898)"
                               disabled>
                    </div>

                </div>

            </div>

            <!-- FOOTER -->
            <div class="card-footer text-center">

                <button type="submit" class="btn btn-primary">
                    <i class="feather-save me-1"></i>
                    Save Teacher
                </button>

            </div>

        </div>

    </form>

</div>

{% endblock %}
