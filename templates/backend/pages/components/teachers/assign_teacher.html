
{% extends 'backend/home/base.html' %}

{% block title %}Bulk Assign Teacher{% endblock %}

{% block content %}

<div class="main-content mt-4">

<form method="POST">

    <div class="card shadow-sm">

        <div class="card-header">
            <h5 class="mb-0">
                Assign Teacher To Multiple Classes & Subjects
            </h5>
        </div>

        <div class="card-body">

            <!-- TEACHER -->
            <div class="mb-4">
                <label class="fw-bold mb-2">
                    Teacher
                </label>

                <select name="teacher_id"
                        class="form-select"
                        required>

                    <option value="">
                        Select Teacher
                    </option>

                    {% for t in teachers %}
                    <option value="{{ t._id }}">
                        {{ t.full_name }}
                    </option>
                    {% endfor %}

                </select>
            </div>

            <hr>

            <div class="table-responsive">

                <table class="table table-bordered align-middle">

                    <thead class="table-light">
                        <tr>
                            <th width="30%">Class</th>
                            <th width="25%">Section</th>
                            <th width="30%">Subject</th>
                            <th width="15%">Action</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">

                        <tr>

                            <!-- CLASS -->
                            <td>
                                <select name="class_ids"
                                        class="form-select"
                                        required>

                                    <option value="">
                                        Select Class
                                    </option>

                                    {% for c in classes %}
                                    <option value="{{ c._id }}">
                                        {{ c.class_name }}
                                    </option>
                                    {% endfor %}

                                </select>
                            </td>

                            <!-- SECTION -->
                            <td>
                                <select name="section_ids"
                                        class="form-select">

                                    <option value="">
                                        No Section
                                    </option>

                                    {% for s in sections %}
                                    <option value="{{ s._id }}">
                                        {{ s.section_name }}
                                    </option>
                                    {% endfor %}

                                </select>
                            </td>

                            <!-- SUBJECT -->
                            <td>
                                <select name="subject_ids"
                                        class="form-select"
                                        required>

                                    <option value="">
                                        Select Subject
                                    </option>

                                    {% for sub in subjects %}
                                    <option value="{{ sub._id }}">
                                        {{ sub.subject_name }}
                                    </option>
                                    {% endfor %}

                                </select>
                            </td>

                            <!-- REMOVE -->
                            <td class="text-center">

                                <button type="button"
                                        class="btn btn-danger btn-sm removeRow">
                                    Remove
                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div class="mt-3">

                <button type="button"
                        class="btn btn-success"
                        id="addRow">

                    <i class="feather-plus"></i>
                    Add More Assignment

                </button>

            </div>

        </div>

        <div class="card-footer text-center">

            <button type="submit"
                    class="btn btn-primary px-5">

                <i class="feather-save me-1"></i>
                Save Assignments

            </button>

        </div>

    </div>

</form>

</div>

<script>

document.getElementById('addRow').addEventListener('click', function() {

    let tbody = document.getElementById('tableBody');

    let row = tbody.rows[0].cloneNode(true);

    row.querySelectorAll('select').forEach(function(select){
        select.value = "";
    });

    tbody.appendChild(row);
});

document.addEventListener('click', function(e){

    if(e.target.classList.contains('removeRow')){

        let tbody = document.getElementById('tableBody');

        if(tbody.rows.length > 1){
            e.target.closest('tr').remove();
        }
    }
});

</script>

{% endblock %}
