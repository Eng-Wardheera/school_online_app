{% extends 'backend/home/base.html' %}

{% block title %}Edit Teacher{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <div class="card-header">
                <h5>Edit Teacher</h5>
            </div>

            <div class="card-body">

                <!-- FULL NAME -->
                <div class="mb-3">
                    <label class="fw-bold">Full Name</label>
                    <input type="text"
                           name="full_name"
                           class="form-control"
                           value="{{ teacher.full_name }}"
                           required>
                </div>

        

            </div>

            <div class="card-footer text-center">
                <button class="btn btn-primary">
                    Update Teacher
                </button>
            </div>

        </div>

    </form>

</div>

{% endblock %}
