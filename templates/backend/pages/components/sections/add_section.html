{% extends 'backend/home/base.html' %}

{% block title %}Add Section{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <div class="card-header">
                <h5>Add New Section</h5>
            </div>

            <div class="card-body">

                <!-- SECTION NAME -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="fw-bold">Section Name</label>
                    </div>

                    <div class="col-md-9">
                        <input type="text"
                               name="section_name"
                               class="form-control"
                               placeholder="Example: A / Morning / Subax"
                               required>
                    </div>
                </div>

                <!-- CLASS SELECT -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="fw-bold">Class</label>
                    </div>

                    <div class="col-md-9">
                        <select name="class_id" class="form-select" required>

                            <option value="">-- Select Class --</option>

                            {% for class in classes %}
                                <option value="{{ class._id }}">
                                    {{ class.class_name }}
                                </option>
                            {% endfor %}

                        </select>
                    </div>
                </div>

            </div>

            <div class="card-footer text-center">
                <button class="btn btn-primary">
                    Save Section
                </button>
            </div>

        </div>

    </form>

</div>

{% endblock %}
