{% extends 'backend/home/base.html' %}

{% block title %}Edit Section{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <div class="card-header">
                <h5>Edit Section</h5>
            </div>

            <div class="card-body">

                <!-- SECTION NAME -->
                <label class="fw-bold">Section Name</label>
                <input type="text"
                       name="section_name"
                       class="form-control mb-3"
                       value="{{ section.section_name }}"
                       required>

                <!-- CLASS -->
                <label class="fw-bold">Class</label>

                <select name="class_id" class="form-select" required>

                    {% for c in classes %}
                        <option value="{{ c._id }}"
                            {% if c._id|string == section.class_id|string %}selected{% endif %}>

                            {{ c.class_name }}

                        </option>
                    {% endfor %}

                </select>

            </div>

            <div class="card-footer text-center">
                <button class="btn btn-primary">
                    Update Section
                </button>
            </div>

        </div>

    </form>

</div>

{% endblock %}
