{% extends 'backend/home/base.html' %}

{% block title %}Add Class{% endblock %}

{% block content %}

<div class="main-content mt-4">
    <form method="POST">

        <div class="card">

            <div class="card-header">
                <h5 class="mb-0">Add New Class</h5>
            </div>

            <div class="card-body">

                <div class="row">
                    <div class="col-md-3">
                        <label class="fw-bold">
                            Class Name
                        </label>
                    </div>

                    <div class="col-md-9">
                        <input type="text"
                               class="form-control"
                               name="class_name"
                               placeholder="Example: Grade 10-A"
                               required>
                    </div>
                </div>

            </div>

            <div class="card-footer text-center">
                <button type="submit" class="btn btn-primary">
                    Save Class
                </button>
            </div>

        </div>

    </form>
</div>

{% endblock %}
