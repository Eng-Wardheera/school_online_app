{% extends 'backend/home/base.html' %}

{% block title %}Edit Class{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <div class="card-header">
                <h5>Edit Class</h5>
            </div>

            <div class="card-body">

                <label class="fw-bold">Class Name</label>

                <input type="text"
                       name="class_name"
                       class="form-control"
                       value="{{ classroom.class_name }}"
                       required>

            </div>

            <div class="card-footer text-center">
                <button class="btn btn-primary">
                    Update Class
                </button>
            </div>

        </div>

    </form>

</div>

{% endblock %}
