{% extends 'backend/home/base.html' %}

{% block title %}Edit Result{% endblock %}

{% block content %}

<div class="page-header">
    <h5>Edit Result</h5>
</div>

<div class="main-content">

<div class="card shadow">

    <div class="card-body">

        <h5>{{ student.full_name }}</h5>
        <p class="text-muted">{{ subject.subject_name }}</p>

        <form method="POST">

            <div class="mb-3">

                <label>Score</label>

                <input type="number"
                       step="0.01"
                       name="score"
                       class="form-control"
                       value="{{ result.score if result else '' }}"
                       required>

            </div>

            <button type="submit" class="btn btn-primary">
                Save Result
            </button>

            <a href="{{ url_for('main.admin_results_overview') }}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

</div>

{% endblock %}
