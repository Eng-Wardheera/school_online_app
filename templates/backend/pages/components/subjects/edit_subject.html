{% extends 'backend/home/base.html' %}

{% block title %}Edit Subject{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <!-- HEADER -->
            <div class="card-header">
                <h5 class="mb-0">Edit Subject</h5>
            </div>

            <!-- BODY -->
            <div class="card-body">

                <!-- SUBJECT NAME -->
                <div class="row mb-3">

                    <div class="col-md-3">
                        <label class="fw-bold">
                            Subject Name
                        </label>
                    </div>

                    <div class="col-md-9">
                        <input type="text"
                               name="subject_name"
                               class="form-control"
                               value="{{ subject.subject_name }}"
                               placeholder="Example: Xisaab"
                               required>
                    </div>

                </div>

            </div>

            <!-- FOOTER -->
            <div class="card-footer text-center">

                <button type="submit" class="btn btn-primary">
                    <i class="feather-save me-1"></i>
                    Update Subject
                </button>

            </div>

        </div>

    </form>

</div>

{% endblock %}
