{% extends 'backend/home/base.html' %}

{% block title %}Add Subject{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST">

        <div class="card">

            <div class="card-header">
                <h5>Add Subject</h5>
            </div>

            <div class="card-body">

                <label class="fw-bold">Subject Name</label>

                <input type="text"
                       name="subject_name"
                       class="form-control"
                       placeholder="Example: Xisaab"
                       required>

            </div>

            <div class="card-footer text-center">
                <button class="btn btn-primary">
                    Save Subject
                </button>
            </div>

        </div>

    </form>

</div>

{% endblock %}
